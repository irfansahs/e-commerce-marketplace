<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>E-Commerce Marketplace</title>
  <style>
    :root {
      --bg: #0f1419;
      --fg: #e8eef4;
      --muted: #8b9aab;
      --accent: #3d9a6a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, #1a3a2a 0%, transparent 50%),
        radial-gradient(ellipse 70% 50% at 90% 80%, #1a2a3a 0%, transparent 45%),
        var(--bg);
      color: var(--fg);
      padding: 2rem;
    }
    main { max-width: 36rem; text-align: center; }
    h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 650;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    p { color: var(--muted); line-height: 1.6; margin-bottom: 1.5rem; }
    .badge {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      border: 1px solid color-mix(in srgb, var(--accent) 50%, transparent);
      border-radius: 999px;
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <p class="badge">Deploy OK</p>
    <h1>E-Commerce Marketplace</h1>
    <p>Altyapı ayağa kalktı. Mikroservisler ve Next.js storefront sıradaki sprintlerde eklenecek.</p>
  </main>
</body>
</html>
