# Lightweight web-only stack for EC2 (static index.html via Nginx).
# Usage: NGINX_PORT=80 docker compose -f docker-compose.web.yml up -d

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: marketplace-web
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/web/public:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
