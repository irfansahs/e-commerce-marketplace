services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: marketplace-mssql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA:-Y}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Marketplace_Local1!}
      MSSQL_PID: Developer
    ports:
      - "${MSSQL_HOST_PORT:-14330}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - marketplace
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mssql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: marketplace-mssql-init
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Marketplace_Local1!}
    volumes:
      - ./infra/mssql/init:/init:ro
    entrypoint:
      - /bin/bash
      - -c
      - /opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P "$${MSSQL_SA_PASSWORD}" -C -i /init/01-create-databases.sql
    networks:
      - marketplace
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: marketplace-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - marketplace
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: marketplace-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-marketplace}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-change_me_local_only}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - marketplace
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  identity-api:
    build:
      context: .
      dockerfile: services/identity/Marketplace.Identity.Api/Dockerfile
    container_name: marketplace-identity-api
    restart: unless-stopped
    depends_on:
      mssql-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__ApplyMigrationsOnStartup: "true"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Marketplace_Local1!}
      MSSQL_SERVER: mssql,1433
      ConnectionStrings__Identity: Server=mssql,1433;Database=identity_db;User Id=sa;Password=Marketplace_Local1!;TrustServerCertificate=True
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: ${RABBITMQ_DEFAULT_USER:-marketplace}
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS:-change_me_local_only}
      Jwt__SigningKey: dev-only-signing-key-min-32-chars!!
      Gelf__Enabled: "true"
      Gelf__Host: graylog
      Gelf__Port: "12201"
    networks:
      - marketplace

  gateway-api:
    build:
      context: .
      dockerfile: services/gateway/Marketplace.Gateway.Api/Dockerfile
    container_name: marketplace-gateway-api
    restart: unless-stopped
    depends_on:
      identity-api:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Jwt__Enabled: "false"
      Gelf__Enabled: "true"
      Gelf__Host: graylog
      Gelf__Port: "12201"
    networks:
      - marketplace

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: marketplace-web
    restart: unless-stopped
    depends_on:
      gateway-api:
        condition: service_healthy
    environment:
      INTERNAL_API_URL: http://gateway-api:8080
      COOKIE_SECURE: "false"
    networks:
      - marketplace

  nginx:
    image: nginx:1.27-alpine
    container_name: marketplace-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      gateway-api:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - marketplace
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/tr || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  marketplace:
    name: marketplace-network
    driver: bridge

volumes:
  mssql_data:
  redis_data:
  rabbitmq_data:
